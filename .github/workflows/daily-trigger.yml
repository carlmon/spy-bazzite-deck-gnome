---
name: Daily change check trigger
on:
  schedule:
    - cron: '0 20 * * *'  # 8PM UTC every day
  workflow_dispatch:

jobs:
  check_upstream:
    name: Check if upstream changed and trigger build if so
    runs-on: ubuntu-24.04

    permissions:
      actions: write
      contents: read
      
    steps:
      - name: Check if upstream changed in last 24 hours
        id: check
        run: |
          upstream_image="ghcr.io/ublue-os/bazzite-deck-gnome:testing"
          upstream_date=$(docker buildx imagetools inspect $upstream_image --format '{{.Image.Created}}')
          upstream_timestamp=$(date -u -d "${upstream_date% UTC}" +%s)
          now=$(date -u +%s)
          cutoff=$((now - 24*3600))
          if [ "$upstream_timestamp" -gt "$cutoff" ]; then
            echo "Upstream image changed at $upstream_date, proceeding with build."
            curl -sS -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches \
              -d '{"ref":"main"}'
          else
            echo "Upstream image has not changed in the last 24 hours ($upstream_date), skipping build."
            exit 78
          fi